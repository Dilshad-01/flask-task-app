services:
  web:
    image: flask-task-app:latest
    container_name: flask-app
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks_db
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
